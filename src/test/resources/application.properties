spring.application.name=chs-gov-uk-notify-integration-api

spring.data.mongodb.auto-index-creation=true
api.url=http://api.chs.local:4001
account.api.url=http://account.chs.local:4001
chs.internal.api.key=dummy

de.flapdoodle.mongodb.embedded.version=6.0.16-rc0

signin.url=http://chs.local/signin

spring.data.mongodb.uri=${MONGODB_URL:mongodb://localhost:27017}
spring.data.mongodb.database=${MONGODB_DATABASE:notification}
spring.data.mongodb.host=${MONGODB_HOST:localhost}
spring.data.mongodb.port=${MONGODB_PORT:27017}
spring.data.mongodb.username=${MONGODB_USERNAME:mongoadmin}
spring.data.mongodb.password=${MONGODB_PASSWORD:chdeep}
